<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager | Login</title>
    <style>
        body { font-family: sans-serif; background: #ececec; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input { width: 100%; padding: 0.8rem; margin: 0.5rem 0 1rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 0.8rem; background: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1a252f; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2 style="text-align: center; margin-bottom: 1.5rem;">System Login</h2>
        <form id="loginForm">
            <label>Email</label>
            <input type="email" id="email" required>
            
            <label>Password</label>
            <input type="password" id="password" required>
            
            <button type="submit">Authenticate</button>
        </form>
        <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem;">
            No account? <a href="register.html">Register here</a>
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    // 1. Replace this URL with your actual live Railway public domain URL
    const BACKEND_URL = 'https://your-railway-backend-url.up.railway.app'; 

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
        // 2. Fire the POST request to your authController login endpoint
        const response = await fetch(`${BACKEND_URL}/api/auth/login`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
            // Throw an error if the server returns a bad status (like 400 or 401)
            throw new Error(data.error || 'Authentication failed');
        }

        // 3. SUCCESS: Store the returned JWT token securely in the browser
        localStorage.setItem('token', data.token);
        alert(`Welcome back, ${data.user.name}! Redirecting to dashboard...`);
        
        // 4. Redirect to your dashboard page (which we can create next)
        window.location.href = 'dashboard.html';
        console.log('Token securely saved:', data.token);

    } catch (error) {
        // Catch network issues or invalid login alerts
        alert('Login Error: ' + error.message);
        console.error('Login failure:', error);
    }
});
    </script>

</body>
</html>
